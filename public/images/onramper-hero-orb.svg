<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbGrad" cx="30%" cy="30%" r="70%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="40%" stop-color="#0080FF" />
      <stop offset="100%" stop-color="#000080" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="highlight" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>
  <circle cx="250" cy="250" r="200" fill="url(#orbGrad)" filter="url(#glow)" />
  <circle cx="250" cy="250" r="200" fill="url(#highlight)" />
  <!-- Inner ring for realism -->
  <circle cx="245" cy="245" r="190" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
</svg>
